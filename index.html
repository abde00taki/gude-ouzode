<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ousama — premium local guide at Ouzoud Waterfalls, Azilal, Morocco."
    />
    <title>Ousama | Ouzoud Waterfalls Guide</title>
    <script>
      (function () {
        try {
          var key = "ousama-theme";
          var dark = window.localStorage.getItem(key) === "dark";
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var loc = window.localStorage.getItem("ousama-locale");
          if (loc === "ar") {
            document.documentElement.setAttribute("dir", "rtl");
            document.documentElement.setAttribute("lang", "ar");
          } else if (loc === "fr" || loc === "es" || loc === "en") {
            document.documentElement.setAttribute("dir", "ltr");
            document.documentElement.setAttribute("lang", loc);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
